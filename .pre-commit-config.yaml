repos:
  # 1. General auto-fixers (removes trailing spaces, fixes newlines)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # 2. Auto-sort imports to match ament's strict alphabetical rule (I100, I101)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        # The "google" profile closely matches ROS 2's alphabetical expectations
        args: ["--profile", "google", "--line-length=99"]

  # 3. Auto-format standard Python spacing and line length
  - repo: https://github.com/pre-commit/mirrors-autopep8
    rev: v2.3.1
    hooks:
      - id: autopep8
        args: ["-i", "--max-line-length=99"]

  # 4. Catch the exact ROS 2 style errors (ament_flake8 equivalent)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=99", "--inline-quotes=single"]
        additional_dependencies:
          - flake8-quotes        # Catches the Q000 double quote errors
          - flake8-import-order  # Catches the I100/I101 import order errors
          - flake8-builtins

  # 5. Catch the exact ROS 2 docstring errors (ament_pep257 equivalent)
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--convention=pep257", "--add-ignore=D100,D101,D102,D103,D104,D105,D106,D107"]
        # (We ignore D10x because ROS doesn't strictly force you to document *everything*, 
        # it just dictates how the documentation should look if it exists).